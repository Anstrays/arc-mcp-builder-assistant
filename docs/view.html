<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Styled Markdown documentation reader for the Arc MCP Builder Assistant GitHub Pages site." />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="color-scheme" content="dark" />
  <title>Docs viewer · Arc MCP Builder Assistant</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; upgrade-insecure-requests" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='0.5' stop-color='%2306b6d4'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' font-family='Inter,Arial,sans-serif' font-size='38' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e1a;
      --bg-elevated: #111827;
      --bg-card: rgba(17, 24, 39, 0.8);
      --bg-glass: rgba(17, 24, 39, 0.6);
      --ink: #f1f5f9;
      --ink-secondary: #cbd5e1;
      --muted: #94a3b8;
      --soft: #64748b;
      --line: rgba(148, 163, 184, 0.15);
      --line-strong: rgba(148, 163, 184, 0.25);
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --cyan: #06b6d4;
      --cyan-glow: rgba(6, 182, 212, 0.2);
      --violet: #8b5cf6;
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.2);
      --amber: #f59e0b;
      --rose: #f43f5e;
      --gradient-1: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #8b5cf6 100%);
      --gradient-2: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px var(--accent-glow);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.12), transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.08), transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04), transparent 70%),
        linear-gradient(180deg, #0a0e1a 0%, #0f172a 50%, #0a0e1a 100%);
      line-height: 1.7;
    }
    a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    a:focus-visible,
    button:focus-visible,
    select:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: var(--radius-sm); }
    .skip-link { position: absolute; left: -9999px; top: 12px; z-index: 10; padding: 10px 14px; border-radius: 999px; background: var(--accent); color: #fff; font-weight: 900; }
    .skip-link:focus { left: 12px; }
    header, main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 26px 0 12px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap; }
    .brand { display: inline-flex; gap: 12px; align-items: center; font-weight: 950; letter-spacing: -0.02em; color: var(--ink); }
    .dot { width: 14px; height: 14px; border-radius: 999px; background: var(--gradient-1); box-shadow: 0 0 28px var(--accent-glow); }
    nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    nav a, .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--bg-glass);
      color: var(--ink-secondary);
      font-weight: 700;
      font-size: 0.94rem;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }
    nav a:hover, .button:hover { border-color: var(--accent); color: var(--accent-hover); transform: translateY(-1px); }
    .button.primary { color: #fff; background: var(--gradient-2); border-color: transparent; box-shadow: 0 4px 25px rgba(59, 130, 246, 0.4); }
    .button.primary:hover { box-shadow: 0 6px 35px rgba(59, 130, 246, 0.5); }
    .button.secondary { color: var(--ink); }
    main { padding: 28px 0 72px; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 300px); gap: 24px; align-items: start; }
    .panel, aside {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--bg-card), var(--bg-glass));
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px);
    }
    .panel { padding: clamp(22px, 4vw, 46px); overflow: hidden; }
    aside { position: sticky; top: 18px; padding: 20px; }
    .panel, aside { min-width: 0; }
    .eyebrow { color: var(--accent); font-size: 0.78rem; font-weight: 950; text-transform: uppercase; letter-spacing: 0.16em; }
    h1, h2, h3 { line-height: 1.12; letter-spacing: -0.035em; }
    h1, h2, h3, p, li, .meta, .doc-list a { overflow-wrap: anywhere; }
    h1 { margin: 12px 0 14px; font-size: clamp(2rem, 6vw, 4.2rem); font-weight: 900; background: linear-gradient(135deg, var(--ink) 0%, var(--ink-secondary) 50%, var(--muted) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h2 { margin: 34px 0 12px; font-size: clamp(1.45rem, 3vw, 2.2rem); font-weight: 800; }
    h3 { margin: 26px 0 10px; font-size: 1.25rem; font-weight: 700; }
    p, li { color: var(--muted); }
    ul, ol { padding-left: 1.4rem; }
    li ul, li ol { margin-top: 6px; }
    .task { display: inline-flex; gap: 8px; align-items: flex-start; }
    .task input { margin-top: 0.42em; accent-color: var(--accent); }
    .table-wrap { overflow-x: auto; margin: 18px 0; border: 1px solid var(--line); border-radius: var(--radius-md); }
    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
    th { color: var(--ink); background: rgba(59, 130, 246, 0.08); font-size: 0.88rem; text-transform: uppercase; letter-spacing: 0.06em; }
    tr:last-child td { border-bottom: 0; }
    pre {
      overflow-x: auto;
      padding: 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.38);
      color: #dbeafe;
      font-family: var(--font-mono);
    }
    code { font-family: var(--font-mono); color: var(--cyan); }
    p code, li code { padding: 2px 6px; border-radius: 8px; background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.18); }
    blockquote { margin: 20px 0; padding: 14px 18px; border-left: 4px solid var(--accent); background: rgba(59, 130, 246, 0.08); border-radius: var(--radius-sm); color: var(--ink); }
    hr { border: 0; border-top: 1px solid var(--line); margin: 30px 0; }
    .meta { color: var(--muted); margin-bottom: 20px; }
    .doc-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 28px; }
    .doc-list { display: grid; gap: 8px; margin-top: 14px; }
    .doc-list a { color: var(--muted); padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: all 0.2s ease; }
    .doc-list a:hover { color: var(--ink); border-color: var(--line); background: rgba(255, 255, 255, 0.03); }
    .doc-list a[aria-current="page"] { color: var(--ink); border-color: rgba(59, 130, 246, 0.32); background: rgba(59, 130, 246, 0.08); }
    .doc-group { margin: 16px 0 0; color: var(--accent); font-size: 0.72rem; font-weight: 950; text-transform: uppercase; letter-spacing: 0.14em; }
    .error { color: var(--amber); }
    @media (max-width: 900px) {
      main { grid-template-columns: minmax(0, 1fr); }
      aside { position: static; }
    }
    @media (max-width: 700px) {
      header, main { width: calc(100% - 24px); }
      .topbar { flex-direction: column; align-items: flex-start; }
      nav { width: 100%; justify-content: flex-start; }
      .panel { padding: 20px; }
      h1 { font-size: clamp(1.6rem, 8vw, 2.4rem); }
      h2 { font-size: clamp(1.2rem, 5vw, 1.6rem); }
      .button { padding: 10px 14px; font-size: 0.88rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <header>
    <div class="topbar">
      <a class="brand" href="../" aria-label="Arc MCP Builder Assistant home"><span class="dot" aria-hidden="true"></span>Arc MCP Builder Assistant</a>
      <nav aria-label="Docs navigation">
        <a href="../">Home</a>
        <a href="../examples/payment-intent-playground/">Playground</a>
        <a href="https://github.com/Anstrays/arc-mcp-builder-assistant/tree/main/docs" target="_blank" rel="noopener noreferrer">Docs source</a>
      </nav>
    </div>
  </header>
  <main>
    <article class="panel" id="content">
      <p class="eyebrow">Styled Markdown reader</p>
      <h1 id="doc-title">Loading docs…</h1>
      <p class="meta" id="doc-meta">Rendering checked-in Markdown as a readable GitHub Pages page.</p>
      <div class="doc-actions">
        <a class="button primary" id="docs-home-link" href="../index.html#docs">Back to styled docs</a>
        <a class="button secondary" id="github-link" href="https://github.com/Anstrays/arc-mcp-builder-assistant/tree/main/docs" target="_blank" rel="noopener noreferrer">Edit on GitHub</a>
      </div>
      <div id="doc-body" aria-live="polite"></div>
    </article>
    <aside aria-label="Available pages">
      <p class="eyebrow">Pages</p>
      <strong>Choose a readable page</strong>
      <div class="doc-list" id="doc-list"></div>
    </aside>
  </main>
  <script src="./viewer.js" defer></script>
</body>
</html>
