<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arc Payment Intent Demo</title>
  <style>
    :root {
      --bg: #06070c;
      --panel: #0d1020;
      --panel-2: #11162b;
      --text: #f7f8ff;
      --muted: #a9b1d6;
      --line: rgba(255,255,255,.12);
      --blue: #6b7cff;
      --cyan: #5eead4;
      --lime: #d9ff72;
      --red: #ff6b6b;
      --green: #5eea7a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 10% -10%, rgba(107,124,255,.42), transparent 32rem),
                  radial-gradient(circle at 90% 0%, rgba(94,234,212,.18), transparent 28rem),
                  linear-gradient(180deg, #080a14 0%, var(--bg) 42%, #04050a 100%);
      min-height: 100vh;
    }
    .wrap { width: min(800px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
    h1 { font-size: clamp(28px, 4vw, 48px); letter-spacing: -.05em; margin: 0 0 6px; }
    .lead { color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 18px; margin: 0 0 16px; color: var(--cyan); }
    label { display: block; color: var(--muted); font-size: 13px; font-weight: 700; margin-bottom: 4px; margin-top: 14px; }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.3);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
    .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .label { color: var(--muted); }
    .value { font-weight: 700; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .pending { background: rgba(107,124,255,.2); color: var(--blue); }
    .submitted { background: rgba(94,234,212,.15); color: var(--cyan); }
    .confirmed { background: rgba(94,234,122,.15); color: var(--green); }
    .failed { background: rgba(255,107,107,.15); color: var(--red); }
    .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
    }
    .primary { background: var(--text); color: var(--bg); }
    .secondary { background: rgba(255,255,255,.1); color: var(--text); }
    .danger { background: rgba(255,107,107,.15); color: var(--red); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 16px 20px;
      max-width: 380px; display: none;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .toast.show { display: block; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    .intent-list { margin-top: 10px; }
    .intent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px; border: 1px solid var(--line); border-radius: 14px;
      margin-bottom: 10px; background: rgba(0,0,0,.2);
    }
    .empty { color: var(--muted); text-align: center; padding: 30px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Arc Payment Intent Demo</h1>
    <p class="lead">
      AI agent создаёт USDC payment request → человек ревьюит и аппрувит.
      Safe first step toward agentic commerce on Arc.
    </p>

    <div class="card">
      <h2>Create Payment Intent</h2>
      <div class="grid-2">
        <div>
          <label>Agent Name</label>
          <input id="agent" value="Research Agent" />
        </div>
        <div>
          <label>Asset</label>
          <select id="asset"><option>USDC</option><option>EURC</option></select>
        </div>
      </div>
      <div class="grid-2">
        <div>
          <label>Recipient Address</label>
          <input id="recipient" value="0xRecipient...Arc" />
        </div>
        <div>
          <label>Amount</label>
          <input id="amount" type="number" step="0.01" value="5.00" />
        </div>
      </div>
      <label>Memo</label>
      <textarea id="memo" rows="2">Payment for data analysis task — 5.00 USDC</textarea>
      <div class="actions">
        <button class="primary" onclick="createIntent()">Create Payment Intent</button>
      </div>
    </div>

    <div class="card">
      <h2>Payment Intents</h2>
      <div id="intent-list" class="intent-list">
        <div class="empty">No payment intents yet. Create one above.</div>
      </div>
    </div>

    <div class="card">
      <h2>Arc Testnet Info</h2>
      <div id="network-info">Loading...</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API = '';
    let loadedIntents = [];

    async function api(path, opts = {}) {
      const resp = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      return resp.json();
    }

    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + type;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function statusBadge(status) {
      const cls = status.replace('pending_user_approval', 'pending')
                        .replace('pending', 'pending')
                        .split('_')[0];
      return `<span class="status-badge ${cls}">${status.replace(/_/g, ' ')}</span>`;
    }

    async function createIntent() {
      const data = {
        agent: document.getElementById('agent').value,
        asset: document.getElementById('asset').value,
        recipient: document.getElementById('recipient').value,
        amount: document.getElementById('amount').value,
        memo: document.getElementById('memo').value,
      };

      if (!data.recipient || !data.amount || parseFloat(data.amount) <= 0) {
        showToast('Please fill in recipient and amount', 'error');
        return;
      }

      try {
        const result = await api('/api/intent', {
          method: 'POST',
          body: JSON.stringify(data),
        });
        showToast(`Intent ${result.id} created — pending approval`);
        loadIntents();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function approveIntent(id) {
      try {
        const result = await api('/api/approve', {
          method: 'POST',
          body: JSON.stringify({ intent_id: id }),
        });
        showToast(`Intent ${id}: ${result.status}`);
        loadIntents();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function loadIntents() {
      try {
        const data = await api('/api/intents');
        loadedIntents = data;
        const container = document.getElementById('intent-list');
        if (data.length === 0) {
          container.innerHTML = '<div class="empty">No payment intents yet. Create one above.</div>';
          return;
        }
        container.innerHTML = data.map(intent => `
          <div class="intent-item">
            <div>
              <strong>${intent.agent}</strong><br/>
              <span style="color:var(--muted);font-size:13px">
                ${intent.amount} ${intent.asset} → ${intent.recipient.slice(0, 12)}...
              </span>
            </div>
            <div style="text-align:right">
              ${statusBadge(intent.status)}<br/>
              ${intent.status === 'pending_user_approval'
                ? `<button class="primary" style="padding:6px 14px;font-size:13px;margin-top:6px" onclick="approveIntent('${intent.id}')">Approve</button>`
                : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('intent-list').innerHTML =
          `<div class="empty">Backend not running. Start with: <code>python3 examples/payment-intent-demo/server.py</code></div>`;
      }
    }

    async function loadNetworkInfo() {
      try {
        const info = await api('/api/network');
        document.getElementById('network-info').innerHTML = `
          <div class="row"><span class="label">Network</span><span class="value">${info.network}</span></div>
          <div class="row"><span class="label">Chain ID</span><span class="value">${info.chain_id}</span></div>
          <div class="row"><span class="label">RPC</span><span class="value" style="font-size:13px">${info.rpc_url}</span></div>
          <div class="row"><span class="label">Currency</span><span class="value">${info.currency}</span></div>
          <div class="row"><span class="label">Explorer</span><span class="value" style="font-size:13px">${info.explorer}</span></div>
          <div class="row"><span class="label">Gas</span><span class="value">${info.gas_estimate}</span></div>
        `;
      } catch (e) {
        document.getElementById('network-info').textContent = 'Backend offline. Start server.py to see network info.';
      }
    }

    loadIntents();
    loadNetworkInfo();
  </script>
</body>
</html>
