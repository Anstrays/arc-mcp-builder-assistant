name: Monitor Arc builder readiness

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arc-readiness-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Monitor Arc Testnet facts and public readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3, Node 24

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.2.0, Node 24
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Run local regression suite
        run: python scripts/test_all.py

      - name: Publish strict read-only Doctor summary
        shell: bash
        run: |
          set +e
          python scripts/arc_builder_doctor.py \
            --include-arc-rpc \
            --include-public-site \
            --strict \
            --markdown > "$RUNNER_TEMP/arc-builder-doctor.md"
          doctor_status=$?
          set -e
          cat "$RUNNER_TEMP/arc-builder-doctor.md" >> "$GITHUB_STEP_SUMMARY"
          exit "$doctor_status"
