name: Validate static site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Test payment intent playground
        run: python scripts/test_payment_intent_playground.py

      - name: Test local x402 boundary
        run: python scripts/test_x402_boundary.py

      - name: Test receipt verifier playground
        run: python scripts/test_receipt_verifier_playground.py

      - name: Test transaction status playground
        run: python scripts/test_transaction_status_playground.py

      - name: Test agent commerce components
        run: python scripts/test_agent_commerce_components.py

      - name: Test agent commerce flows
        run: python scripts/test_agent_commerce_flows.py

      - name: Test agent commerce review packet
        run: python scripts/test_agent_commerce_review_packet.py

      - name: Test agent identity profile preview
        run: python scripts/test_agent_identity_profile_preview.py

      - name: Test job escrow simulator
        run: python scripts/test_job_escrow_simulator.py

      - name: Validate repository files
        run: python scripts/validate_repo.py
