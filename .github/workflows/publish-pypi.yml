name: Publish arc-builder-kit to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build, verify, and publish
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/arc-builder-kit
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Verify release tag and package versions
        run: python scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"

      - name: Run canonical regression suite
        run: python scripts/test_all.py

      - name: Install pinned build tools
        run: python -m pip install --disable-pip-version-check build==1.5.0 twine==6.2.0

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
