name: Feature request / builder idea
description: Suggest an improvement to docs, prompts, the payment-intent demo, or the toolkit overall.
title: "[idea] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Arc MCP Builder Assistant is an early independent builder kit. Use
        cases, Arc MCP setup improvements, prompt suggestions, and demo
        ideas are especially welcome. Mark unknowns explicitly instead of
        inventing Arc behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem are you trying to solve, or what gap does this fill?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the approach you have in mind, even if it is rough.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.
  - type: input
    id: scope
    attributes:
      label: Which part of the project?
      description: e.g. MCP setup docs, prompts, payment-intent demo, deploy-contracts notes, validator, CI.
